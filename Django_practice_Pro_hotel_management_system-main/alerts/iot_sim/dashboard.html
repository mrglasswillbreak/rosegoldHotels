<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Hotel IoT System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

.room-card {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.room-card.alert {
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { box-shadow: 0 0 10px red; }
    50% { box-shadow: 0 0 25px red; }
    100% { box-shadow: 0 0 10px red; }
}

.status { font-weight: bold; margin-top: 10px; }
.normal { color: #2ecc71; }
.warning { color: orange; }
.critical { color: red; }

.sensor { font-size: 14px; margin: 5px 0; }

.stats {
    padding: 20px;
}
</style>
</head>

<body>

<header>🏨 Smart IoT Hotel Monitoring System</header>

<div class="stats">
    <h3>📊 System Overview</h3>
    <p>🚨 Critical: <span id="criticalCount">0</span></p>
    <p>⚠️ Warning: <span id="warningCount">0</span></p>
    <p>✅ Normal: <span id="normalCount">0</span></p>
</div>

<div class="container" id="rooms"></div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

<script>
const API_POST = "http://127.0.0.1:8000/iot-data/";
const API_GET = "http://127.0.0.1:8000/get-iot-data/";

// ROOMS
const rooms = [
    {name:"Room 101", occupied:true},
    {name:"Room 102", occupied:false},
    {name:"Room 103", occupied:true},
    {name:"Room 104", occupied:true}
];

// CREATE UI
function createUI() {
    const container = document.getElementById("rooms");

    rooms.forEach((room, i) => {
        const div = document.createElement("div");
        div.className = "room-card";

        div.innerHTML = `
            <h3>${room.name}</h3>
            <div class="sensor" id="sensor-${i}">Loading...</div>
            <canvas id="chart-${i}" height="120"></canvas>
            <div class="status" id="status-${i}"></div>
        `;

        container.appendChild(div);

        const ctx = document.getElementById(`chart-${i}`).getContext("2d");

        room.chart = new Chart(ctx, {
            type: "line",
            data: {
                labels: [],
                datasets: [
                    {label:"Temp", data:[]},
                    {label:"Gas", data:[]},
                    {label:"Motion", data:[]}
                ]
            },
            options: {
                animation:false,
                scales:{ y:{ beginAtZero:true } }
            }
        });
    });
}

// LOAD DATA FROM DJANGO
async function loadData() {
    const res = await fetch(API_GET);
    const data = await res.json();

    let critical = 0, warning = 0, normal = 0;

    rooms.forEach((room, i) => {
        const roomData = data.filter(d => d.room === room.name);

        if (roomData.length === 0) return;

        const latest = roomData[0];

        // UPDATE TEXT
        document.getElementById(`sensor-${i}`).innerHTML =
            `🌡 ${latest.temperature}°C | 🔥 ${latest.gas} | 🚶 ${latest.motion}`;

        const statusDiv = document.getElementById(`status-${i}`);
        statusDiv.innerText = `${latest.status}`;

        statusDiv.className = "status " + latest.status.toLowerCase();

        // COUNT STATS
        if (latest.status.includes("CRITICAL")) critical++;
        else if (latest.status.includes("WARNING")) warning++;
        else normal++;

        // UPDATE CHART
        room.chart.data.labels = roomData.map(d => d.timestamp);
        room.chart.data.datasets[0].data = roomData.map(d => d.temperature);
        room.chart.data.datasets[1].data = roomData.map(d => d.gas * 10);
        room.chart.data.datasets[2].data = roomData.map(d =>
            d.motion === "Idle" ? 0 :
            d.motion === "Normal" ? 10 : 20
        );

        room.chart.update();

        // ALERT EFFECT
        const card = document.getElementsByClassName("room-card")[i];
        if (latest.status.includes("CRITICAL")) {
            card.classList.add("alert");
            document.getElementById("alertSound").play();
        } else {
            card.classList.remove("alert");
        }
    });

    document.getElementById("criticalCount").innerText = critical;
    document.getElementById("warningCount").innerText = warning;
    document.getElementById("normalCount").innerText = normal;
}

// SIMULATION → SEND DATA TO DJANGO
function simulate() {
    rooms.forEach(room => {
        const temp = Math.round(25 + (Math.random()*4 - 2) + (Math.random()<0.1 ? 10 : 0));
        const gas = Math.random()<0.85 ? 0 : Math.random()<0.95 ? 1 : 2;
        const motion = room.occupied ?
            ["Normal","Busy","Critical"][Math.floor(Math.random()*3)] :
            (Math.random()<0.9 ? "Idle" : "Critical");

        const status =
            gas === 2 ? "CRITICAL" :
            gas === 1 ? "WARNING" :
            (!room.occupied && motion !== "Idle") ? "CRITICAL" :
            temp > 35 ? "WARNING" :
            motion === "Critical" ? "WARNING" :
            "NORMAL";

        fetch(API_POST, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                room: room.name,
                temperature: temp,
                gas: gas,
                motion: motion,
                status: status
            })
        }).catch(()=>{});
    });
}

// INIT
createUI();

// RUN SYSTEM
setInterval(simulate, 3000);   // send data
setInterval(loadData, 4000);   // update dashboard
</script>

</body>
</html>
