services:
  - type: web
    name: hotel-management-system
    env: python
    rootDir: Django_practice_Pro_hotel_management_system-main
    buildCommand: "./build.sh"
    startCommand: "gunicorn HotelManagementSystem.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: PYTHON_VERSION
        value: "3.9.0"
